name: Build rodin android15-6.6 GKI with SukiSU Ultra

on:
  workflow_dispatch:

env:
  DEVICE: rodin
  ROM_VERSION: OS3.0.10.0.WOJMIXM
  ANDROID_COMMON_BRANCH: android15-6.6
  ANDROID_MANIFEST_BRANCH: common-android15-6.6
  KERNEL_WORKSPACE: kernel-workspace
  DIST_DIR: out/dist
  ARTIFACT_DIR: artifacts
  SUKISU_SETUP_URL: https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh
  SUSFS_REPO: https://gitlab.com/simonpunk/susfs4ksu.git
  SUSFS_BRANCH: gki-android15-6.6

jobs:
  build-gki:
    name: Build GKI arm64 attempt
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Show host context
        run: |
          set -Eeuo pipefail
          uname -a
          lsb_release -a || true
          df -h
          nproc
          git --version

      - name: Install dependencies
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc \
            bison \
            build-essential \
            ca-certificates \
            cpio \
            curl \
            dwarves \
            file \
            flex \
            git \
            libelf-dev \
            libncurses-dev \
            libssl-dev \
            lld \
            llvm \
            make \
            pahole \
            patch \
            python-is-python3 \
            python3 \
            rsync \
            unzip \
            xz-utils \
            zip \
            zstd

      - name: Fetch Android common kernel
        run: |
          set -Eeuo pipefail
          mkdir -p "${KERNEL_WORKSPACE}"

          echo "Trying Android kernel manifest branch: ${ANDROID_MANIFEST_BRANCH}"
          curl -L --fail --show-error \
            https://storage.googleapis.com/git-repo-downloads/repo \
            -o "${KERNEL_WORKSPACE}/repo"
          chmod +x "${KERNEL_WORKSPACE}/repo"

          cd "${KERNEL_WORKSPACE}"
          ./repo init \
            -u https://android.googlesource.com/kernel/manifest \
            -b "${ANDROID_MANIFEST_BRANCH}" \
            --depth=1
          ./repo sync -c --no-tags --fail-fast -j"$(nproc)"

          echo "KERNEL_SRC=${GITHUB_WORKSPACE}/${KERNEL_WORKSPACE}/common" >> "${GITHUB_ENV}"
          echo "KERNEL_ROOT=${GITHUB_WORKSPACE}/${KERNEL_WORKSPACE}" >> "${GITHUB_ENV}"
          echo "FETCH_MODE=repo manifest ${ANDROID_MANIFEST_BRANCH}" >> "${GITHUB_ENV}"

      - name: Inspect kernel tree before patch
        run: |
          set -Eeuo pipefail
          echo "Fetch mode: ${FETCH_MODE}"
          echo "Kernel root: ${KERNEL_ROOT}"
          echo "Kernel source: ${KERNEL_SRC}"

          cd "${KERNEL_SRC}"
          pwd
          git status --short || true
          git log -1 --oneline || true

          echo "Top-level files:"
          find . -maxdepth 1 -mindepth 1 -printf '%P\n' | sort

          echo "Build-related files under kernel source:"
          find . -maxdepth 4 -type f \
            \( -name 'Makefile' \
            -o -name 'build.sh' \
            -o -name 'build.config*' \
            -o -name 'BUILD' \
            -o -name 'BUILD.bazel' \
            -o -name 'WORKSPACE' \
            -o -name 'MODULE.bazel' \
            -o -name '*.bzl' \
            -o -name '.bazelrc' \) \
            -print | sort | awk 'NR <= 300 { print }'

          echo "Build-related files under workspace root:"
          find "${KERNEL_ROOT}" -maxdepth 4 -type f \
            \( -name 'build.sh' \
            -o -name 'BUILD' \
            -o -name 'BUILD.bazel' \
            -o -name 'WORKSPACE' \
            -o -name 'MODULE.bazel' \
            -o -name '*.bzl' \
            -o -name '.bazelrc' \) \
            -print | sort | awk 'NR <= 300 { print }'

      - name: Apply SukiSU Ultra builtin patch
        run: |
          set -Eeuo pipefail
          cd "${KERNEL_SRC}"

          echo "Downloading official SukiSU Ultra setup.sh:"
          echo "${SUKISU_SETUP_URL}"
          curl -L --fail --show-error "${SUKISU_SETUP_URL}" -o /tmp/sukisu-setup.sh
          chmod +x /tmp/sukisu-setup.sh

          echo "Running SukiSU Ultra setup.sh in builtin mode."
          bash /tmp/sukisu-setup.sh builtin

          echo "SukiSU-related files after patch:"
          find . -maxdepth 5 \
            \( -iname '*sukisu*' -o -iname '*kernelsu*' -o -iname '*ksu*' \) \
            -print | sort | awk 'NR <= 300 { print }'

          echo "Git status after SukiSU patch:"
          git status --short || true

      - name: Integrate SUSFS for GKI android15-6.6
        run: |
          set -Eeuo pipefail
          cd "${GITHUB_WORKSPACE}"

          dump_susfs_tree() {
            echo "susfs4ksu files, maxdepth 4:"
            if [ -d susfs4ksu ]; then
              find susfs4ksu -maxdepth 4 -type f | sort
            else
              echo "susfs4ksu directory does not exist"
            fi
          }

          fail_susfs() {
            echo "::error title=SUSFS integration failed::$1"
            dump_susfs_tree
            exit 3
          }

          echo "Cloning SUSFS from ${SUSFS_REPO}, branch ${SUSFS_BRANCH}"
          git clone --depth=1 --branch "${SUSFS_BRANCH}" "${SUSFS_REPO}" susfs4ksu

          echo "Available SUSFS patch files:"
          find susfs4ksu -maxdepth 4 -type f \
            \( -name '*.patch' -o -name '*.diff' \) \
            -print | sort

          SUSFS_KERNEL_PATCH=""
          for candidate in \
            susfs4ksu/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch \
            susfs4ksu/kernel_patches/50_add_susfs_in_gki-android15*.patch \
            susfs4ksu/kernel_patches/50_add_susfs_in_gki*6.6*.patch \
            susfs4ksu/kernel_patches/*android15*6.6*.patch \
            susfs4ksu/kernel_patches/*gki*6.6*.patch \
            susfs4ksu/kernel_patches/*6.6*.patch; do
            for patch_file in ${candidate}; do
              if [ -f "${patch_file}" ]; then
                SUSFS_KERNEL_PATCH="${patch_file}"
                break 2
              fi
            done
          done

          if [ -z "${SUSFS_KERNEL_PATCH}" ]; then
            fail_susfs "No SUSFS kernel patch found for gki/android15-6.6."
          fi

          if [ ! -f susfs4ksu/kernel_patches/include/linux/susfs.h ]; then
            fail_susfs "susfs4ksu/kernel_patches/include/linux/susfs.h is missing."
          fi
          if [ ! -d susfs4ksu/kernel_patches/fs ]; then
            fail_susfs "susfs4ksu/kernel_patches/fs is missing."
          fi
          if [ ! -d susfs4ksu/kernel_patches/include/linux ]; then
            fail_susfs "susfs4ksu/kernel_patches/include/linux is missing."
          fi

          echo "Selected SUSFS kernel patch: ${SUSFS_KERNEL_PATCH}"
          echo "Copying SUSFS fs and include files into ${KERNEL_SRC}"
          cp -v susfs4ksu/kernel_patches/fs/* "${KERNEL_SRC}/fs/"
          cp -v susfs4ksu/kernel_patches/include/linux/* "${KERNEL_SRC}/include/linux/"

          echo "Applying SUSFS kernel patch to ${KERNEL_SRC}"
          cd "${KERNEL_SRC}"
          if ! patch -p1 < "${GITHUB_WORKSPACE}/${SUSFS_KERNEL_PATCH}"; then
            cd "${GITHUB_WORKSPACE}"
            fail_susfs "Could not apply ${SUSFS_KERNEL_PATCH} to kernel-workspace/common automatically."
          fi

          cd "${GITHUB_WORKSPACE}"
          if ! test -f kernel-workspace/common/include/linux/susfs.h; then
            fail_susfs "kernel-workspace/common/include/linux/susfs.h is missing after SUSFS patch."
          fi

          echo "SUSFS header check OK:"
          ls -l kernel-workspace/common/include/linux/susfs.h

      - name: Enable SUSFS TRY_UMOUNT config fragment
        run: |
          set -Eeuo pipefail

          SUSFS_CONFIG_FRAGMENT="${KERNEL_SRC}/arch/arm64/configs/sukisu_susfs.config"
          echo "Writing SUSFS config fragment: ${SUSFS_CONFIG_FRAGMENT}"

          config_symbol_exists() {
            local symbol="$1"
            find "${KERNEL_SRC}" -type f \( -name 'Kconfig' -o -name 'Kconfig.*' \) \
              -exec grep -Eq "^[[:space:]]*(menuconfig|config)[[:space:]]+${symbol}([[:space:]]|$)" {} \; \
              -print -quit | grep -q .
          }

          : > "${SUSFS_CONFIG_FRAGMENT}"
          missing_required_symbols=0
          for symbol in \
            KSU \
            KSU_SUSFS \
            KSU_SUSFS_SUS_PATH \
            KSU_SUSFS_SUS_MOUNT \
            KSU_SUSFS_SUS_KSTAT \
            KSU_SUSFS_TRY_UMOUNT \
            KSU_SUSFS_SPOOF_UNAME \
            KSU_SUSFS_ENABLE_LOG \
            KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS \
            KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG \
            KSU_SUSFS_OPEN_REDIRECT \
            KSU_SUSFS_SUS_MAP \
            KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT \
            KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT \
            KSU_SUSFS_HAS_MAGIC_MOUNT; do
            if config_symbol_exists "${symbol}"; then
              echo "CONFIG_${symbol}=y" >> "${SUSFS_CONFIG_FRAGMENT}"
            else
              echo "CONFIG_${symbol} is not available in current Kconfig; skipping."
              case "${symbol}" in
                KSU|KSU_SUSFS|KSU_SUSFS_TRY_UMOUNT)
                  echo "::error title=Required Kconfig missing::CONFIG_${symbol} is required for SukiSU SUSFS TRY_UMOUNT."
                  missing_required_symbols=1
                  ;;
              esac
            fi
          done

          if [ "${missing_required_symbols}" -ne 0 ]; then
            exit 6
          fi

          echo "SUSFS config fragment content:"
          cat "${SUSFS_CONFIG_FRAGMENT}"

          cd "${KERNEL_SRC}"
          python3 - <<'PY'
          import re
          from pathlib import Path

          build_file = Path("BUILD.bazel")
          fragment = "arch/arm64/configs/sukisu_susfs.config"
          text = build_file.read_text()

          target_pattern = re.compile(
              r'(?P<head>^(?P<indent>\s*)"kernel_aarch64"\s*:\s*\{\n)'
              r'(?P<body>.*?)'
              r'(?P<tail>^\s*\},\n(?P=indent)"kernel_aarch64_16k"\s*:)',
              re.MULTILINE | re.DOTALL,
          )
          match = target_pattern.search(text)
          if not match:
              raise SystemExit("Could not locate kernel_aarch64 target config in BUILD.bazel")

          body = match.group("body")
          body_indent = match.group("indent") + "    "

          if fragment not in body:
              defconfig_pattern = re.compile(
                  r'(?P<prefix>^\s*"defconfig_fragments"\s*:\s*\[)'
                  r'(?P<items>.*?)'
                  r'(?P<suffix>\],)',
                  re.MULTILINE | re.DOTALL,
              )
              defconfig_match = defconfig_pattern.search(body)
              if defconfig_match:
                  items = defconfig_match.group("items")
                  replacement = (
                      defconfig_match.group("prefix")
                      + items
                      + f'\n{body_indent}    "{fragment}",\n{body_indent}'
                      + defconfig_match.group("suffix")
                  )
                  body = body[:defconfig_match.start()] + replacement + body[defconfig_match.end():]
              else:
                  make_goals_pattern = re.compile(
                      r'(?P<line>^\s*"make_goals"\s*:\s*_GKI_AARCH64_MAKE_GOALS,\n)',
                      re.MULTILINE,
                  )
                  body, substitutions = make_goals_pattern.subn(
                      lambda m: m.group("line")
                      + f'{body_indent}"defconfig_fragments": ["{fragment}"],\n',
                      body,
                      count=1,
                  )
                  if substitutions != 1:
                      raise SystemExit("Could not insert defconfig_fragments for kernel_aarch64")

          new_text = (
              text[:match.start("body")]
              + body
              + text[match.end("body"):]
          )
          build_file.write_text(new_text)
          print(f"Configured kernel_aarch64 defconfig_fragments with {fragment}")
          PY

          echo "kernel_aarch64 BUILD.bazel config after patch:"
          awk '
            /"kernel_aarch64"[[:space:]]*:/ { in_target = 1 }
            in_target { print }
            in_target && /^[[:space:]]*},[[:space:]]*$/ { exit }
          ' BUILD.bazel

      - name: Verify SUSFS TRY_UMOUNT kernel config
        run: |
          set -Eeuo pipefail
          mkdir -p "${ARTIFACT_DIR}"
          : > "${ARTIFACT_DIR}/kernel_config_susfs.txt"

          cd "${KERNEL_ROOT}"
          {
            echo "Building Kleaf config target before full kernel build:"
            echo "tools/bazel build //common:kernel_aarch64_config"
            tools/bazel build \
              --verbose_failures \
              --sandbox_debug \
              --jobs=4 \
              //common:kernel_aarch64_config
          } 2>&1 | tee -a "${GITHUB_WORKSPACE}/${ARTIFACT_DIR}/kernel_config_susfs.txt"

          config_candidates="$(mktemp)"
          for search_dir in \
            "${KERNEL_ROOT}/bazel-bin/common" \
            "${KERNEL_ROOT}/out"; do
            if [ -d "${search_dir}" ]; then
              find -L "${search_dir}" \
                \( -path '*/out/bazel/output_user_root/*/external/*' \
                -o -path '*/out/bazel/output_user_root/*/*/external/*' \
                -o -path '*/sandbox/*' \) -prune \
                -o -type f -name '.config' -print 2>/dev/null || true
            fi
          done | sort -u > "${config_candidates}"

          {
            echo
            echo "Generated .config candidates:"
            cat "${config_candidates}"
          } | tee -a "${GITHUB_WORKSPACE}/${ARTIFACT_DIR}/kernel_config_susfs.txt"

          FINAL_CONFIG=""
          while IFS= read -r config_file; do
            [ -n "${config_file}" ] || continue
            if grep -q '^CONFIG_KSU' "${config_file}"; then
              FINAL_CONFIG="${config_file}"
              break
            fi
          done < "${config_candidates}"

          if [ -z "${FINAL_CONFIG}" ]; then
            while IFS= read -r config_file; do
              [ -n "${config_file}" ] || continue
              FINAL_CONFIG="${config_file}"
              break
            done < "${config_candidates}"
          fi

          rm -f "${config_candidates}"

          if [ -z "${FINAL_CONFIG}" ]; then
            echo "::error title=Kernel config missing::Could not find generated .config for //common:kernel_aarch64_config." | tee -a "${GITHUB_WORKSPACE}/${ARTIFACT_DIR}/kernel_config_susfs.txt"
            exit 4
          fi

          {
            echo
            echo "Selected final kernel config: ${FINAL_CONFIG}"
            echo
            echo "SukiSU/SUSFS config lines:"
            grep -E 'CONFIG_KSU|CONFIG_KSU_SUSFS|SUSFS|TRY_UMOUNT' "${FINAL_CONFIG}" || true
          } | tee -a "${GITHUB_WORKSPACE}/${ARTIFACT_DIR}/kernel_config_susfs.txt"

          if ! grep -q '^CONFIG_KSU_SUSFS_TRY_UMOUNT=y$' "${FINAL_CONFIG}"; then
            echo "::error title=SUSFS TRY_UMOUNT disabled::CONFIG_KSU_SUSFS_TRY_UMOUNT=y is absent from final kernel config." | tee -a "${GITHUB_WORKSPACE}/${ARTIFACT_DIR}/kernel_config_susfs.txt"
            exit 5
          fi

      - name: Build GKI arm64 attempt
        run: |
          set -Eeuo pipefail
          : > "${GITHUB_WORKSPACE}/kernel_build.log"
          mkdir -p "${GITHUB_WORKSPACE}/${DIST_DIR}"

          echo "Build target: GKI arm64 android15-6.6 for ${DEVICE}"
          echo "ROM context: ${ROM_VERSION}"
          echo "Page size context: 4K"
          echo "Kernel source: ${KERNEL_SRC}"
          echo "Kernel root: ${KERNEL_ROOT}"

          if [ ! -x "${KERNEL_ROOT}/tools/bazel" ]; then
            echo "::error title=No tools/bazel::android15-6.6 GKI must be built with Kleaf/Bazel from the Android kernel manifest workspace."
            echo "Detected Bazel/Kleaf files:"
            find "${KERNEL_ROOT}" -maxdepth 5 -type f \
              \( -name 'BUILD' \
              -o -name 'BUILD.bazel' \
              -o -name 'WORKSPACE' \
              -o -name 'MODULE.bazel' \
              -o -name '*.bzl' \
              -o -name '.bazelrc' \) \
              -print | sort | awk 'NR <= 500 { print }'
            exit 2
          fi

          echo "Running Kleaf target: //common:kernel_aarch64_dist"
          cd "${KERNEL_ROOT}"
          tools/bazel run \
            --verbose_failures \
            --sandbox_debug \
            --jobs=4 \
            //common:kernel_aarch64_dist \
            -- --dist_dir="${GITHUB_WORKSPACE}/${DIST_DIR}" \
            2>&1 | tee -a "${GITHUB_WORKSPACE}/kernel_build.log"

      - name: Find kernel outputs
        if: always()
        run: |
          set -Eeuo pipefail
          mkdir -p "${ARTIFACT_DIR}/outputs"
          : > "${ARTIFACT_DIR}/found-outputs.txt"

          if [ ! -f "${GITHUB_WORKSPACE}/kernel_build.log" ]; then
            : > "${GITHUB_WORKSPACE}/kernel_build.log"
          fi
          cp -v "${GITHUB_WORKSPACE}/kernel_build.log" "${ARTIFACT_DIR}/kernel_build.log"

          candidate_list="$(mktemp)"

          echo "Collecting files from dist directories only:"
          for dist_dir in \
            "${GITHUB_WORKSPACE}/kernel-workspace/out/dist" \
            "${GITHUB_WORKSPACE}/out/dist"; do
            if [ -d "${dist_dir}" ]; then
              echo "Found dist dir: ${dist_dir}"
              find "${dist_dir}" -type f -print >> "${candidate_list}"
            else
              echo "Missing dist dir: ${dist_dir}"
            fi
          done

          echo "Searching for kernel outputs while excluding Bazel internals:"
          find "${GITHUB_WORKSPACE}" \
            \( -path "${GITHUB_WORKSPACE}/${ARTIFACT_DIR}" \
            -o -path "${GITHUB_WORKSPACE}/${ARTIFACT_DIR}/*" \
            -o -path '*/out/bazel/output_user_root' \
            -o -path '*/out/bazel/output_user_root/*' \
            -o -path '*/sandbox' \
            -o -path '*/sandbox/*' \
            -o -path '*/external' \
            -o -path '*/external/*' \
            -o -path '*/prebuilt_ndk' \
            -o -path '*/prebuilt_ndk/*' \) -prune \
            -o -type f \
            \( -name 'Image' \
            -o -name 'Image.gz' \
            -o -name '*.ko' \
            -o -name '*.img' \
            -o -name 'vmlinux' \
            -o -name 'System.map' \) \
            -print >> "${candidate_list}"

          sort -u "${candidate_list}" | tee "${ARTIFACT_DIR}/found-outputs.txt"

          while IFS= read -r output_file; do
            [ -n "${output_file}" ] || continue
            relative_path="${output_file#${GITHUB_WORKSPACE}/}"
            destination="${ARTIFACT_DIR}/outputs/${relative_path}"
            mkdir -p "$(dirname "${destination}")"
            cp -v "${output_file}" "${destination}"
          done < "${ARTIFACT_DIR}/found-outputs.txt"

          rm -f "${candidate_list}"

          echo "Artifact directory:"
          find "${ARTIFACT_DIR}" -type f -print | sort
          echo "Artifact file count:"
          find "${ARTIFACT_DIR}" -type f | wc -l

      - name: Upload kernel outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rodin-android15-6.6-sukisu-ultra-gki
          path: |
            artifacts/**
            kernel_build.log
          if-no-files-found: warn
