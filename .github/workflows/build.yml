name: Build rodin android15-6.6 GKI with SukiSU Ultra

on:
  workflow_dispatch:
    inputs:
      manifest_ref:
        description: Android kernel manifest branch/tag/ref for repo init.
        required: true
        default: common-android15-6.6
        type: string
      common_ref:
        description: Optional kernel/common branch/tag/SHA. Leave empty to auto-detect Linux 6.6.89.
        required: false
        default: ''
        type: string

env:
  DEVICE: rodin
  ROM_VERSION: OS3.0.10.0.WOJMIXM
  ANDROID_COMMON_BRANCH: android15-6.6
  MANIFEST_REF: ${{ inputs.manifest_ref || 'common-android15-6.6' }}
  COMMON_REF: ${{ inputs.common_ref || '' }}
  EXPECTED_KERNEL_VERSION: 6.6.89
  KERNEL_WORKSPACE: kernel-workspace
  DIST_DIR: out/dist
  ARTIFACT_DIR: artifacts
  SUKISU_SETUP_URL: https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh
  SUSFS_REPO: https://gitlab.com/simonpunk/susfs4ksu.git
  SUSFS_BRANCH: gki-android15-6.6

jobs:
  build-gki:
    name: Build GKI arm64 attempt
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Show host context
        run: |
          set -Eeuo pipefail
          uname -a
          lsb_release -a || true
          df -h
          nproc
          git --version

      - name: Install dependencies
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc \
            bison \
            build-essential \
            ca-certificates \
            cpio \
            curl \
            dwarves \
            file \
            flex \
            git \
            libelf-dev \
            libncurses-dev \
            libssl-dev \
            lld \
            llvm \
            make \
            pahole \
            patch \
            python-is-python3 \
            python3 \
            rsync \
            unzip \
            xz-utils \
            zip \
            zstd

      - name: Diagnose remote refs
        run: |
          set -Eeuo pipefail
          mkdir -p "${ARTIFACT_DIR}"
          {
            echo "kernel/common refs matching android15-6.6, 2025-05, 2025-06, 6.6.89:"
            git ls-remote --heads --tags https://android.googlesource.com/kernel/common \
              | grep -E "android15-6.6|2025-05|2025-06|6.6.89" || true
            echo
            echo "kernel/manifest refs matching android15-6.6, 2025-05, 2025-06, 6.6.89:"
            git ls-remote --heads --tags https://android.googlesource.com/kernel/manifest \
              | grep -E "android15-6.6|2025-05|2025-06|6.6.89" || true
          } | tee "${ARTIFACT_DIR}/remote_refs.txt"

      - name: Fetch Android common kernel
        run: |
          set -Eeuo pipefail
          mkdir -p "${KERNEL_WORKSPACE}"

          echo "Trying Android kernel manifest ref: ${MANIFEST_REF}"
          curl -L --fail --show-error \
            https://storage.googleapis.com/git-repo-downloads/repo \
            -o "${KERNEL_WORKSPACE}/repo"
          chmod +x "${KERNEL_WORKSPACE}/repo"

          cd "${KERNEL_WORKSPACE}"
          ./repo init \
            -u https://android.googlesource.com/kernel/manifest \
            -b "${MANIFEST_REF}" \
            --depth=1
          ./repo sync -c --no-tags --fail-fast -j"$(nproc)"

          echo "KERNEL_SRC=${GITHUB_WORKSPACE}/${KERNEL_WORKSPACE}/common" >> "${GITHUB_ENV}"
          echo "KERNEL_ROOT=${GITHUB_WORKSPACE}/${KERNEL_WORKSPACE}" >> "${GITHUB_ENV}"
          echo "FETCH_MODE=repo manifest ${MANIFEST_REF}" >> "${GITHUB_ENV}"

      - name: Detect and verify kernel/common version
        run: |
          set -Eeuo pipefail
          mkdir -p "${ARTIFACT_DIR}"
          candidates_file="${ARTIFACT_DIR}/kernel_ref_candidates.txt"
          kernel_version_file="${ARTIFACT_DIR}/kernel_version.txt"
          : > "${candidates_file}"
          : > "${kernel_version_file}"

          COMMON_REMOTE=https://android.googlesource.com/kernel/common
          MANIFEST_REMOTE=https://android.googlesource.com/kernel/manifest
          SELECTED_COMMON_REF=""
          SELECTED_COMMON_COMMIT=""
          SELECTED_COMMON_VERSION=""
          SELECTED_SOURCE=""

          makefile_kernelversion() {
            awk '
              /^VERSION[[:space:]]*=/ { version = $3 }
              /^PATCHLEVEL[[:space:]]*=/ { patchlevel = $3 }
              /^SUBLEVEL[[:space:]]*=/ { sublevel = $3 }
              /^EXTRAVERSION[[:space:]]*=/ { extraversion = $3 }
              END {
                if (version && patchlevel && sublevel) {
                  printf "%s.%s.%s%s\n", version, patchlevel, sublevel, extraversion
                }
              }
            '
          }

          resolve_common_ref() {
            local requested_ref="$1"
            local remote_ref=""

            for candidate in \
              "${requested_ref}" \
              "refs/tags/${requested_ref}" \
              "refs/heads/${requested_ref}"; do
              if git -C "${KERNEL_SRC}" ls-remote --exit-code --refs origin "${candidate}" >/dev/null 2>&1; then
                remote_ref="${candidate}"
                break
              fi
            done

            echo "${remote_ref}"
          }

          probe_common_ref() {
            local source="$1"
            local requested_ref="$2"
            local remote_ref=""
            local commit_ref=""
            local version=""
            local sha=""

            remote_ref="$(resolve_common_ref "${requested_ref}")"
            if [ -z "${remote_ref}" ]; then
              if [[ "${requested_ref}" =~ ^[0-9a-fA-F]{7,40}$ ]] && git -C "${KERNEL_SRC}" fetch --depth=1 origin "${requested_ref}" >/dev/null 2>&1; then
                commit_ref="$(git -C "${KERNEL_SRC}" rev-parse 'FETCH_HEAD^{commit}')"
                version="$(git -C "${KERNEL_SRC}" show "${commit_ref}:Makefile" | makefile_kernelversion)"
                sha="$(git -C "${KERNEL_SRC}" rev-parse --short "${commit_ref}")"
                printf '%s\t%s\t%s\t%s\t%s\n' "${source}" "${requested_ref}" "${requested_ref}" "${version}" "${sha}" | tee -a "${candidates_file}"
                if [ -z "${SELECTED_COMMON_REF}" ] && [ "${version}" = "${EXPECTED_KERNEL_VERSION}" ]; then
                  SELECTED_COMMON_REF="${requested_ref}"
                  SELECTED_COMMON_COMMIT="${commit_ref}"
                  SELECTED_COMMON_VERSION="${version}"
                  SELECTED_SOURCE="${source}"
                fi
                return 0
              fi
              printf '%s\t%s\tmissing\t-\t-\n' "${source}" "${requested_ref}" | tee -a "${candidates_file}"
              return 0
            fi

            if ! git -C "${KERNEL_SRC}" fetch --depth=1 --no-tags origin "${remote_ref}" >/dev/null 2>&1; then
              printf '%s\t%s\tfetch_failed\t%s\t-\n' "${source}" "${requested_ref}" "${remote_ref}" | tee -a "${candidates_file}"
              return 0
            fi

            commit_ref="$(git -C "${KERNEL_SRC}" rev-parse 'FETCH_HEAD^{commit}')"
            version="$(git -C "${KERNEL_SRC}" show "${commit_ref}:Makefile" | makefile_kernelversion)"
            sha="$(git -C "${KERNEL_SRC}" rev-parse --short "${commit_ref}")"
            printf '%s\t%s\t%s\t%s\t%s\n' "${source}" "${requested_ref}" "${remote_ref}" "${version}" "${sha}" | tee -a "${candidates_file}"

            if [ -z "${SELECTED_COMMON_REF}" ] && [ "${version}" = "${EXPECTED_KERNEL_VERSION}" ]; then
              SELECTED_COMMON_REF="${remote_ref}"
              SELECTED_COMMON_COMMIT="${commit_ref}"
              SELECTED_COMMON_VERSION="${version}"
              SELECTED_SOURCE="${source}"
            fi
          }

          probe_manifest_ref() {
            local manifest_ref="$1"
            local tmpdir=""
            local common_revision=""

            tmpdir="$(mktemp -d)"
            git -C "${tmpdir}" init -q
            if ! git -C "${tmpdir}" fetch --depth=1 "${MANIFEST_REMOTE}" "${manifest_ref}" >/dev/null 2>&1; then
              printf 'manifest:%s\t-\tfetch_failed\t-\t-\n' "${manifest_ref}" | tee -a "${candidates_file}"
              rm -rf "${tmpdir}"
              return 0
            fi

            if ! git -C "${tmpdir}" show FETCH_HEAD:default.xml > "${tmpdir}/default.xml" 2>/dev/null; then
              printf 'manifest:%s\t-\tmissing_default_xml\t-\t-\n' "${manifest_ref}" | tee -a "${candidates_file}"
              rm -rf "${tmpdir}"
              return 0
            fi

            common_revision="$(python3 - "${tmpdir}/default.xml" <<'PY'
          import sys
          import xml.etree.ElementTree as ET

          manifest = ET.parse(sys.argv[1]).getroot()
          for project in manifest.findall("project"):
              if project.attrib.get("path") == "common" or project.attrib.get("name") == "kernel/common":
                  print(project.attrib.get("revision", ""))
                  break
          PY
            )"

            if [ -z "${common_revision}" ]; then
              printf 'manifest:%s\t-\tmissing_common_revision\t-\t-\n' "${manifest_ref}" | tee -a "${candidates_file}"
              rm -rf "${tmpdir}"
              return 0
            fi

            probe_common_ref "manifest:${manifest_ref}" "${common_revision}"
            rm -rf "${tmpdir}"
          }

          {
            echo "source	requested_common_ref	resolved_common_ref	kernel_version	commit"
            echo "manifest_ref_input	${MANIFEST_REF}	-	-	-"
            echo "common_ref_input	${COMMON_REF:-<auto>}	-	-	-"
          } | tee -a "${candidates_file}"

          if [ -n "${COMMON_REF}" ]; then
            probe_common_ref "input:common_ref" "${COMMON_REF}"
          else
            manifest_candidates="$(mktemp)"
            {
              echo refs/heads/common-android15-6.6-2025-04
              echo refs/heads/common-android15-6.6-2025-05
              echo refs/heads/common-android15-6.6-2025-06
              git ls-remote --heads --tags "${MANIFEST_REMOTE}" \
                | awk '{ print $2 }' \
                | grep -E 'refs/(heads|tags)/(common-)?android15-6\.6-2025-(04|05|06)' || true
            } | sort -u > "${manifest_candidates}"

            while IFS= read -r manifest_candidate; do
              [ -n "${manifest_candidate}" ] || continue
              probe_manifest_ref "${manifest_candidate}"
            done < "${manifest_candidates}"
            rm -f "${manifest_candidates}"

            common_candidates="$(mktemp)"
            {
              echo refs/tags/android15-6.6.89_r00
              echo refs/heads/android15-6.6-2025-06
              echo refs/heads/android15-6.6-2025-05
              echo refs/heads/android15-6.6-2025-04
              git -C "${KERNEL_SRC}" ls-remote --heads --tags origin \
                | awk '{ print $2 }' \
                | grep -E 'refs/(heads|tags)/android15-6\.6(\.89|-(2025-04|2025-05|2025-06))' || true
            } | sort -u > "${common_candidates}"

            while IFS= read -r common_candidate; do
              [ -n "${common_candidate}" ] || continue
              probe_common_ref "common:${common_candidate}" "${common_candidate}"
            done < "${common_candidates}"
            rm -f "${common_candidates}"
          fi

          if [ -z "${SELECTED_COMMON_REF}" ]; then
            current_version="$(git -C "${KERNEL_SRC}" -c safe.directory="${KERNEL_SRC}" show HEAD:Makefile | makefile_kernelversion || true)"
            {
              echo "Manifest ref: ${MANIFEST_REF}"
              echo "Common ref input: ${COMMON_REF:-<auto>}"
              echo "Current repo-synced common HEAD: $(git -C "${KERNEL_SRC}" rev-parse HEAD)"
              echo "Current repo-synced common version: ${current_version:-unknown}"
              echo "Expected kernel version: ${EXPECTED_KERNEL_VERSION}"
            } | tee -a "${kernel_version_file}"
            echo "::error title=No ${EXPECTED_KERNEL_VERSION} kernel ref found::Could not auto-detect or resolve a kernel/common ref with Linux ${EXPECTED_KERNEL_VERSION}. See remote_refs.txt and kernel_ref_candidates.txt artifacts." | tee -a "${kernel_version_file}"
            exit 10
          fi

          echo "Selected common source: ${SELECTED_SOURCE}" | tee -a "${kernel_version_file}"
          echo "Selected common ref: ${SELECTED_COMMON_REF}" | tee -a "${kernel_version_file}"
          echo "Selected common commit: ${SELECTED_COMMON_COMMIT}" | tee -a "${kernel_version_file}"

          git -C "${KERNEL_SRC}" checkout --detach "${SELECTED_COMMON_COMMIT}"
          cd "${KERNEL_SRC}"
          kernel_version="$(make -s kernelversion)"
          {
            echo "Kernel commit: $(git rev-parse HEAD)"
            echo "Kernel commit short: $(git rev-parse --short HEAD)"
            echo "Kernel commit subject: $(git log -1 --pretty=%s)"
            echo "Kernel version: ${kernel_version}"
            echo "Expected kernel version: ${EXPECTED_KERNEL_VERSION}"
          } | tee -a "${GITHUB_WORKSPACE}/${kernel_version_file}"

          if [ "${kernel_version}" != "${EXPECTED_KERNEL_VERSION}" ]; then
            echo "::error title=Wrong kernel version::Selected ${SELECTED_COMMON_REF} gives ${kernel_version}, expected ${EXPECTED_KERNEL_VERSION}." | tee -a "${GITHUB_WORKSPACE}/${kernel_version_file}"
            exit 11
          fi

      - name: Inspect kernel tree before patch
        run: |
          set -Eeuo pipefail
          echo "Fetch mode: ${FETCH_MODE}"
          echo "Kernel root: ${KERNEL_ROOT}"
          echo "Kernel source: ${KERNEL_SRC}"

          cd "${KERNEL_SRC}"
          pwd
          git status --short || true
          git log -1 --oneline || true

          echo "Top-level files:"
          find . -maxdepth 1 -mindepth 1 -printf '%P\n' | sort

          echo "Build-related files under kernel source:"
          find . -maxdepth 4 -type f \
            \( -name 'Makefile' \
            -o -name 'build.sh' \
            -o -name 'build.config*' \
            -o -name 'BUILD' \
            -o -name 'BUILD.bazel' \
            -o -name 'WORKSPACE' \
            -o -name 'MODULE.bazel' \
            -o -name '*.bzl' \
            -o -name '.bazelrc' \) \
            -print | sort | awk 'NR <= 300 { print }'

          echo "Build-related files under workspace root:"
          find "${KERNEL_ROOT}" -maxdepth 4 -type f \
            \( -name 'build.sh' \
            -o -name 'BUILD' \
            -o -name 'BUILD.bazel' \
            -o -name 'WORKSPACE' \
            -o -name 'MODULE.bazel' \
            -o -name '*.bzl' \
            -o -name '.bazelrc' \) \
            -print | sort | awk 'NR <= 300 { print }'

      - name: Apply SukiSU Ultra builtin patch
        run: |
          set -Eeuo pipefail
          cd "${KERNEL_SRC}"

          echo "Downloading official SukiSU Ultra setup.sh:"
          echo "${SUKISU_SETUP_URL}"
          curl -L --fail --show-error "${SUKISU_SETUP_URL}" -o /tmp/sukisu-setup.sh
          chmod +x /tmp/sukisu-setup.sh

          echo "Running SukiSU Ultra setup.sh in builtin mode."
          bash /tmp/sukisu-setup.sh builtin

          echo "SukiSU-related files after patch:"
          find . -maxdepth 5 \
            \( -iname '*sukisu*' -o -iname '*kernelsu*' -o -iname '*ksu*' \) \
            -print | sort | awk 'NR <= 300 { print }'

          echo "Git status after SukiSU patch:"
          git status --short || true

      - name: Integrate SUSFS for GKI android15-6.6
        run: |
          set -Eeuo pipefail
          cd "${GITHUB_WORKSPACE}"

          dump_susfs_tree() {
            echo "susfs4ksu files, maxdepth 4:"
            if [ -d susfs4ksu ]; then
              find susfs4ksu -maxdepth 4 -type f | sort
            else
              echo "susfs4ksu directory does not exist"
            fi
          }

          fail_susfs() {
            echo "::error title=SUSFS integration failed::$1"
            dump_susfs_tree
            exit 3
          }

          echo "Cloning SUSFS from ${SUSFS_REPO}, branch ${SUSFS_BRANCH}"
          git clone --depth=1 --branch "${SUSFS_BRANCH}" "${SUSFS_REPO}" susfs4ksu

          echo "Available SUSFS patch files:"
          find susfs4ksu -maxdepth 4 -type f \
            \( -name '*.patch' -o -name '*.diff' \) \
            -print | sort

          SUSFS_KERNEL_PATCH=""
          for candidate in \
            susfs4ksu/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch \
            susfs4ksu/kernel_patches/50_add_susfs_in_gki-android15*.patch \
            susfs4ksu/kernel_patches/50_add_susfs_in_gki*6.6*.patch \
            susfs4ksu/kernel_patches/*android15*6.6*.patch \
            susfs4ksu/kernel_patches/*gki*6.6*.patch \
            susfs4ksu/kernel_patches/*6.6*.patch; do
            for patch_file in ${candidate}; do
              if [ -f "${patch_file}" ]; then
                SUSFS_KERNEL_PATCH="${patch_file}"
                break 2
              fi
            done
          done

          if [ -z "${SUSFS_KERNEL_PATCH}" ]; then
            fail_susfs "No SUSFS kernel patch found for gki/android15-6.6."
          fi

          if [ ! -f susfs4ksu/kernel_patches/include/linux/susfs.h ]; then
            fail_susfs "susfs4ksu/kernel_patches/include/linux/susfs.h is missing."
          fi
          if [ ! -d susfs4ksu/kernel_patches/fs ]; then
            fail_susfs "susfs4ksu/kernel_patches/fs is missing."
          fi
          if [ ! -d susfs4ksu/kernel_patches/include/linux ]; then
            fail_susfs "susfs4ksu/kernel_patches/include/linux is missing."
          fi

          echo "Selected SUSFS kernel patch: ${SUSFS_KERNEL_PATCH}"
          echo "Copying SUSFS fs and include files into ${KERNEL_SRC}"
          cp -v susfs4ksu/kernel_patches/fs/* "${KERNEL_SRC}/fs/"
          cp -v susfs4ksu/kernel_patches/include/linux/* "${KERNEL_SRC}/include/linux/"

          echo "Applying SUSFS kernel patch to ${KERNEL_SRC}"
          cd "${KERNEL_SRC}"
          if ! patch -p1 < "${GITHUB_WORKSPACE}/${SUSFS_KERNEL_PATCH}"; then
            cd "${GITHUB_WORKSPACE}"
            fail_susfs "Could not apply ${SUSFS_KERNEL_PATCH} to kernel-workspace/common automatically."
          fi

          cd "${GITHUB_WORKSPACE}"
          if ! test -f kernel-workspace/common/include/linux/susfs.h; then
            fail_susfs "kernel-workspace/common/include/linux/susfs.h is missing after SUSFS patch."
          fi

          echo "SUSFS header check OK:"
          ls -l kernel-workspace/common/include/linux/susfs.h

      - name: Build GKI arm64 attempt
        run: |
          set -Eeuo pipefail
          : > "${GITHUB_WORKSPACE}/kernel_build.log"
          mkdir -p "${GITHUB_WORKSPACE}/${DIST_DIR}"

          echo "Build target: GKI arm64 android15-6.6 for ${DEVICE}"
          echo "ROM context: ${ROM_VERSION}"
          echo "Page size context: 4K"
          echo "Kernel source: ${KERNEL_SRC}"
          echo "Kernel root: ${KERNEL_ROOT}"

          if [ ! -x "${KERNEL_ROOT}/tools/bazel" ]; then
            echo "::error title=No tools/bazel::android15-6.6 GKI must be built with Kleaf/Bazel from the Android kernel manifest workspace."
            echo "Detected Bazel/Kleaf files:"
            find "${KERNEL_ROOT}" -maxdepth 5 -type f \
              \( -name 'BUILD' \
              -o -name 'BUILD.bazel' \
              -o -name 'WORKSPACE' \
              -o -name 'MODULE.bazel' \
              -o -name '*.bzl' \
              -o -name '.bazelrc' \) \
              -print | sort | awk 'NR <= 500 { print }'
            exit 2
          fi

          echo "Running Kleaf target: //common:kernel_aarch64_dist"
          cd "${KERNEL_ROOT}"
          tools/bazel run \
            --verbose_failures \
            --sandbox_debug \
            --jobs=4 \
            //common:kernel_aarch64_dist \
            -- --dist_dir="${GITHUB_WORKSPACE}/${DIST_DIR}" \
            2>&1 | tee -a "${GITHUB_WORKSPACE}/kernel_build.log"

      - name: Find kernel outputs
        if: always()
        run: |
          set -Eeuo pipefail
          mkdir -p "${ARTIFACT_DIR}/outputs"
          : > "${ARTIFACT_DIR}/found-outputs.txt"

          if [ ! -f "${GITHUB_WORKSPACE}/kernel_build.log" ]; then
            : > "${GITHUB_WORKSPACE}/kernel_build.log"
          fi
          cp -v "${GITHUB_WORKSPACE}/kernel_build.log" "${ARTIFACT_DIR}/kernel_build.log"

          candidate_list="$(mktemp)"

          echo "Collecting files from dist directories only:"
          for dist_dir in \
            "${GITHUB_WORKSPACE}/kernel-workspace/out/dist" \
            "${GITHUB_WORKSPACE}/out/dist"; do
            if [ -d "${dist_dir}" ]; then
              echo "Found dist dir: ${dist_dir}"
              find "${dist_dir}" -type f -print >> "${candidate_list}"
            else
              echo "Missing dist dir: ${dist_dir}"
            fi
          done

          echo "Searching for kernel outputs while excluding Bazel internals:"
          find "${GITHUB_WORKSPACE}" \
            \( -path "${GITHUB_WORKSPACE}/${ARTIFACT_DIR}" \
            -o -path "${GITHUB_WORKSPACE}/${ARTIFACT_DIR}/*" \
            -o -path '*/out/bazel/output_user_root' \
            -o -path '*/out/bazel/output_user_root/*' \
            -o -path '*/sandbox' \
            -o -path '*/sandbox/*' \
            -o -path '*/external' \
            -o -path '*/external/*' \
            -o -path '*/prebuilt_ndk' \
            -o -path '*/prebuilt_ndk/*' \) -prune \
            -o -type f \
            \( -name 'Image' \
            -o -name 'Image.gz' \
            -o -name '*.ko' \
            -o -name '*.img' \
            -o -name 'vmlinux' \
            -o -name 'System.map' \) \
            -print >> "${candidate_list}"

          sort -u "${candidate_list}" | tee "${ARTIFACT_DIR}/found-outputs.txt"

          while IFS= read -r output_file; do
            [ -n "${output_file}" ] || continue
            relative_path="${output_file#${GITHUB_WORKSPACE}/}"
            destination="${ARTIFACT_DIR}/outputs/${relative_path}"
            mkdir -p "$(dirname "${destination}")"
            cp -v "${output_file}" "${destination}"
          done < "${ARTIFACT_DIR}/found-outputs.txt"

          rm -f "${candidate_list}"

          echo "Artifact directory:"
          find "${ARTIFACT_DIR}" -type f -print | sort
          echo "Artifact file count:"
          find "${ARTIFACT_DIR}" -type f | wc -l

      - name: Upload kernel outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rodin-android15-6.6-sukisu-ultra-gki
          path: |
            artifacts/**
            kernel_build.log
          if-no-files-found: warn
